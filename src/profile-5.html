<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClassGlass — Student Directory</title>
    <link href="/src/output.css" rel="stylesheet">
    <script src="https://kit.fontawesome.com/fbf4810423.js" crossorigin="anonymous"></script>

</head>

<body class="bg-[#0D1530]">

    <!-- header -->
    <header>
        <div class="flex flex-row justify-between items-center mx-4 md:mx-24 text-lg md:text-2xl py-4 ">
            <h2 class="text-[#2dd4dc] font-medium">ClassGlass</h2>

            <div class="flex justify-center items-center gap-4 sm:gap-6 text-[#94A3B8] text-sm sm:text-xs sm:mt-0">
                <i class="fa-solid fa-arrow-left"></i>
                <h3>Back to Directory</h3>
            </div>
        </div>
    </header>

    <!-- main body -->
    <section>
        <div
            class="flex flex-col md:flex-row justify-between items-start md:items-center mx-4 md:mx-36 mt-10 pb-20 gap-6">

            <!-- Left Section -->
            <div class="flex flex-col md:flex-row gap-6 md:gap-10 items-start md:items-center">

                <!-- Initials Circle -->
                <h2
                    class="text-[#A855F7] text-3xl md:text-4xl font-bold border-2 border-[#A855F7] w-20 h-20 md:w-28 md:h-28 rounded-full text-center flex items-center justify-center">
                    AO
                </h2>

                <div>
                    <h2 class="text-[#ffffff] text-3xl md:text-6xl font-bold">Amara Osei</h2>

                    <div class="text-[#94A3B8] flex flex-col sm:flex-row gap-2 sm:gap-3 text-lg md:text-xl my-2">
                        <h3>UI Designer</h3>
                        <h3>. Computer Science</h3>
                        <h3>. Class of 2025</h3>
                    </div>

                    <!-- Social Buttons -->
                    <div class="flex flex-wrap gap-3 mt-2">
                        <h3 class="text-[#00D4FF] px-4 md:px-6 py-1 rounded-3xl border border-[#00D4FF] text-center">
                            Github</h3>
                        <h3 class="text-[#A855F7] px-4 md:px-6 py-1 rounded-3xl border border-[#A855F7] text-center">
                            LinkedIn</h3>
                        <h3 class="text-[#14B8A6] px-4 md:px-6 py-1 rounded-3xl border border-[#14B8A6] text-center">
                            Twitter</h3>
                    </div>
                </div>
            </div>

            <!-- Right Section -->
            <div class="flex flex-row md:flex-col gap-2 md:gap-3 mt-4 md:mt-0">
                <h3 class="text-[#00D4FF] border border-[#00D4FF] rounded-lg px-4 py-1 text-center font-medium">
                    GPA 3.9
                </h3>
                <h3 class="text-[#14B8A6] border border-[#14B8A6] rounded-lg px-4 py-1 text-center font-medium">
                    Active
                </h3>
            </div>

        </div>




    </section>
</body>

</html>
